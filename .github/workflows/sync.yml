name: Sync Workouts

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch: {}
  repository_dispatch:
    types: [sync-trigger]

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install ".[cloud]"

      - name: Sync
        env:
          # Only DATABASE_URL is needed. Hevy API key and Garmin credentials
          # are read from the platform_credentials table in the database
          # (saved there during the web dashboard setup wizard).
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: hevy2garmin sync -q
